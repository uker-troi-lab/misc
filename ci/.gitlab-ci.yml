variables:
  UV_CACHE_DIR: .uv-cache
  GIT_STRATEGY: fetch
  GIT_CLEAN_FLAGS: none

cache:
  - key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR


.basic_template:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "development"'
      when: always
    - if: '$CI_MERGE_REQUEST_ID'
      when: always
    - when: never

.cleanup_conda:
  script:
    - echo "Removing conda-env venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID"
    - source /home/gitlab-runner/miniconda3/etc/profile.d/conda.sh
    - ENV_PATH="$CONDA_PREFIX"
    - conda deactivate || true
    - conda remove -n venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID --all -y || true
    - rm -rf "$ENV_PATH" || true
  when: manual
  environment:
    name: $CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID
    action: stop


.base_template:
  extends: .basic_template    
  before_script:
    - source /home/gitlab-runner/miniconda3/etc/profile.d/conda.sh
    - conda create -n venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID -y python=3.13
    - conda activate venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID
    - conda install pip -y
    - export UV_PYTHON=$(which python)
    - export UV_PROJECT_ENVIRONMENT=/home/gitlab-runner/.conda/envs/venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID
    - pip install uv
    - cd $CI_PROJECT_DIR
    - echo $UV_PROJECT_ENVIRONMENT
    - uv sync --all-extras
    - uv run ruff --version 

.unittest_template:
  extends: .base_template
  script:
    - cd tests
    - uv run coverage run -m test_suite
    - uv run coverage report --omit="*/_remote_module_non_scriptable*"
    #- uv run coverage report
    - uv cache prune --ci
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'


.linter_template:
  extends: .base_template
  script:
    - uv run ruff check --config pyproject.toml --output-format=gitlab > code-quality-report.json
    - uv cache prune --ci
  artifacts:
    expire_in: 1 week
    reports:
      codequality: $CI_PROJECT_DIR/code-quality-report.json


.formatter_template:
  extends: .base_template
  script:
    - uv run ruff format --config pyproject.toml --diff
    - uv cache prune --ci


.check_dependencies:
  extends: .basic_template
  before_script:
    - source /home/gitlab-runner/miniconda3/etc/profile.d/conda.sh
    - conda create -n venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID -y python=3.13
    - conda activate venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID
    - conda install pip -y
    - export UV_PYTHON=$(which python)
    - export UV_PROJECT_ENVIRONMENT=/home/gitlab-runner/.conda/envs/venv-$CI_PROJECT_NAME-$CI_MERGE_REQUEST_ID
    - pip install uv
    - cd $CI_PROJECT_DIR
    - echo $UV_PROJECT_ENVIRONMENT
    - uv pip install check-dependencies
  script:
    - uv run check-dependencies --all ./src
    - uv cache prune --ci
