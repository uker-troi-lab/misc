variables:
  UV_CACHE_DIR: .uv-cache
  GIT_STRATEGY: fetch
  GIT_CLEAN_FLAGS: none
  CONDA_ENV_NAME: venv-$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG

cache:
  - key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR


.basic_template:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "development"'
      when: always
    - if: '$CI_MERGE_REQUEST_ID'
      when: always
    - when: never

.setup_conda:
  extends: .basic_template
  script:
    - source /home/gitlab-runner/miniconda3/etc/profile.d/conda.sh
    - |
      if conda info --envs | grep -q "$CONDA_ENV_NAME"; then
        echo "Environment $CONDA_ENV_NAME already exists."
      else
        echo "Creating environment $CONDA_ENV_NAME..."
        conda create -n "$CONDA_ENV_NAME" -y python=3.13
      fi
    - conda activate "$CONDA_ENV_NAME"
    - conda install pip -y
    - pip install uv
    - export UV_PYTHON=$(which python)
    - export UV_PROJECT_ENVIRONMENT="$CONDA_PREFIX"
    - cd "$CI_PROJECT_DIR"
    - echo "$UV_PROJECT_ENVIRONMENT"
    - uv sync --all-extras
    - uv run ruff --version

.cleanup_conda:
  extends: .basic_template
  script:
    - echo "Removing conda-env $CONDA_ENV_NAME"
    - source /home/gitlab-runner/miniconda3/etc/profile.d/conda.sh
    - conda deactivate || true
    - conda remove -n "$CONDA_ENV_NAME" --all -y || true
  when: manual
  environment:
    name: $CI_COMMIT_REF_SLUG
    action: stop

.base_template:
  extends: .basic_template    
  before_script:
    - source /home/gitlab-runner/miniconda3/etc/profile.d/conda.sh
    - conda activate "$CONDA_ENV_NAME"
    - export UV_PYTHON=$(which python)
    - export UV_PROJECT_ENVIRONMENT="$CONDA_PREFIX"
    - cd "$CI_PROJECT_DIR"

.unittest_template:
  extends: .base_template
  script:
    - cd tests
    - uv run coverage run -m test_suite
    - uv run coverage report --omit="*/_remote_module_non_scriptable*"
    #- uv run coverage report
    - uv cache prune --ci
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'


.linter_template:
  extends: .base_template
  script:
    - uv run ruff check --config pyproject.toml --output-format=gitlab > code-quality-report.json
    - uv cache prune --ci
  artifacts:
    expire_in: 1 week
    reports:
      codequality: $CI_PROJECT_DIR/code-quality-report.json


.formatter_template:
  extends: .base_template
  script:
    - uv run ruff format --config pyproject.toml --diff
    - uv cache prune --ci


.check_dependencies:
  extends: .base_template
  script:
    - uv pip install check-dependencies
    - uv run check-dependencies --all ./src
    - uv cache prune --ci
